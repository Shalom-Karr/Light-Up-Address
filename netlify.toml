[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  port = 8888
  publish = "."

[[redirects]]
  from = "https://addressitled.netlify.app/*"
  to = "https://addressitled.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
